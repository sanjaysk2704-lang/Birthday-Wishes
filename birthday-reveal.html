<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Deebika</title>
<style>
  :root{
    --pink-hot: #ff2f92;
    --pink-mid: #ff5fa8;
    --pink-light: #ff9ecb;
    --pink-deep: #a80a52;
    --magenta-deep: #3a0a2a;
    --navy-deep: #12071f;
    --gold: #ffb84d;
    --gold-bright: #ffe08a;
    --gold-deep: #d97a1e;
    --cream: #fff1e6;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow:hidden;
    background: radial-gradient(ellipse at 30% 20%, #2a0f22 0%, var(--navy-deep) 55%, #050208 100%);
  }
  .stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .blob{ position:absolute; border-radius:50%; filter:blur(60px); opacity:0.55; pointer-events:none; }
  .blob.red{ width:340px;height:340px; background:#ff3b6b; top:38%; left:6%; }
  .blob.violet{ width:340px;height:340px; background:#8a2be2; top:36%; right:6%; }
  .pink-corner{
    position:absolute; width:70%; height:70%; right:-10%; bottom:-20%;
    background: radial-gradient(circle, rgba(255,20,120,0.45) 0%, rgba(255,20,120,0) 70%);
    pointer-events:none;
  }

  .lights{ position:absolute; top:0; left:0; width:100%; height:120px; pointer-events:none; }
  .lights svg{width:100%; height:100%; display:block;}
  .bulb-glow{ filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 14px currentColor); }

  .sparkle{
    position:absolute; top:-10px; border-radius:50%;
    background:var(--gold-bright);
    box-shadow:0 0 6px 2px rgba(255,224,138,0.8);
    opacity:0.9; animation: fall linear infinite; pointer-events:none;
  }
  @keyframes fall{
    0%{ transform: translateY(0) translateX(0) scale(1); opacity:0; }
    10%{ opacity:1; }
    100%{ transform: translateY(110vh) translateX(var(--drift,20px)) scale(0.6); opacity:0; }
  }

  /* ---------- GIFT SCENE ---------- */
  .gift-scene{
    position:relative; z-index:5;
    display:flex; flex-direction:column; align-items:center; gap:26px;
    transition: opacity .5s ease, transform .5s ease;
  }
  .gift-scene.hide{ opacity:0; transform: scale(0.88); pointer-events:none; }

  .headline{
    font-family: 'Brush Script MT', cursive;
    font-size:52px; color:#fff;
    text-shadow: 0 0 6px #fff, 0 0 18px var(--pink-hot), 0 0 36px var(--pink-hot);
    display:flex; align-items:center; gap:16px; letter-spacing:1px;
  }
  .headline .party{ font-size:34px; filter:none; text-shadow:none; }

  /* ---------- BOX STAGE ---------- */
  .box-stage{
    position:relative;
    width:280px; height:290px;
    display:flex; align-items:center; justify-content:center;
  }

  .ground-shadow{
    position:absolute;
    bottom:18px; left:50%;
    width:150px; height:26px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 72%);
    transform: translateX(-50%);
    transition: transform .3s ease, opacity .3s ease;
  }
  .box-stage.charging .ground-shadow{ animation: shadow-pulse .35s ease-in-out infinite alternate; }
  @keyframes shadow-pulse{ from{ transform: translateX(-50%) scaleX(1);} to{ transform: translateX(-50%) scaleX(0.85);} }
  .box-stage.opened .ground-shadow{ opacity:0; }

  /* orbiting idle sparkles */
  .orbit{
    position:absolute; width:210px; height:210px;
    animation: spin 9s linear infinite;
    pointer-events:none;
  }
  .box-stage.opened .orbit{ opacity:0; transition:opacity .3s ease; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .orbit i{
    position:absolute; width:5px; height:5px;
    border-radius:50%; background:var(--gold-bright);
    box-shadow:0 0 8px 3px rgba(255,224,138,0.85);
  }

  .box-visual{
    position:relative; width:220px; height:220px;
    animation: breathe 2.6s ease-in-out infinite;
    transform-origin: 50% 85%;
  }
  @keyframes breathe{
    0%,100%{ transform: translateY(0) scale(1); }
    50%{ transform: translateY(-6px) scale(1.015); }
  }
  .box-stage.charging .box-visual{
    animation: jitter 0.28s ease-in-out infinite;
  }
  @keyframes jitter{
    0%,100%{ transform: rotate(0deg) translate(0,0); }
    20%{ transform: rotate(-3deg) translate(-3px,0); }
    40%{ transform: rotate(3deg) translate(3px,0); }
    60%{ transform: rotate(-2deg) translate(-2px,-2px); }
    80%{ transform: rotate(2deg) translate(2px,-1px); }
  }
  .box-stage.opened .box-visual{ animation: none; }

  .gift-svg{ width:100%; height:100%; overflow:visible; }

  .glow-pulse{ filter: drop-shadow(0 0 10px rgba(255,47,146,0.55)); }
  .box-stage.charging .glow-pulse{
    animation: glow-up 0.4s ease-in-out infinite alternate;
  }
  @keyframes glow-up{
    from{ filter: drop-shadow(0 0 10px rgba(255,47,146,0.55)); }
    to{ filter: drop-shadow(0 0 32px rgba(255,224,138,0.95)); }
  }

  .lid-group{
    transform-box: fill-box;
    transform-origin: 50% 100%;
    transition: transform 1s cubic-bezier(.17,.84,.36,1.4), opacity .7s ease .1s;
  }
  .box-stage.opened .lid-group{
    transform: translate(14px,-320px) rotate(-65deg) scale(0.55);
    opacity:0;
  }

  .interior-glow{ opacity:0; transition: opacity .35s ease; }
  .box-stage.opened .interior-glow{ opacity:1; }

  .crack{ opacity:0; transition: opacity .2s ease; }
  .box-stage.charging .crack{ opacity:1; animation: crack-flicker 0.3s ease-in-out infinite alternate; }
  @keyframes crack-flicker{ from{ opacity:0.5;} to{ opacity:1;} }

  /* full screen flash */
  .flash-overlay{
    position:absolute; left:50%; top:38%;
    width:20px; height:20px;
    border-radius:50%;
    background: radial-gradient(circle, #fff 0%, var(--gold-bright) 35%, rgba(255,224,138,0) 70%);
    transform: translate(-50%,-50%) scale(0);
    opacity:0;
    pointer-events:none;
  }
  .box-stage.opened .flash-overlay{
    animation: flash 0.85s ease-out forwards;
  }
  @keyframes flash{
    0%{ transform: translate(-50%,-50%) scale(0); opacity:1; }
    35%{ transform: translate(-50%,-50%) scale(22); opacity:1; }
    100%{ transform: translate(-50%,-50%) scale(30); opacity:0; }
  }

  /* shockwave rings */
  .ring{
    position:absolute; left:50%; top:38%;
    width:20px; height:20px; margin:-10px 0 0 -10px;
    border-radius:50%;
    border:3px solid var(--gold-bright);
    opacity:0;
    pointer-events:none;
  }
  .box-stage.opened .ring.r1{ animation: ring-out 0.9s ease-out forwards; }
  .box-stage.opened .ring.r2{ animation: ring-out 0.9s ease-out 0.12s forwards; border-color: var(--pink-light); }
  @keyframes ring-out{
    0%{ width:20px; height:20px; margin:-10px 0 0 -10px; opacity:0.9; }
    100%{ width:340px; height:340px; margin:-170px 0 0 -170px; opacity:0; }
  }

  /* light rays */
  .rays{
    position:absolute; left:50%; top:38%; width:2px; height:2px;
    pointer-events:none;
  }
  .ray{
    position:absolute; left:0; top:0;
    width:6px; height:0;
    background: linear-gradient(to top, rgba(255,224,138,0.9), rgba(255,224,138,0));
    transform-origin: 50% 100%;
    opacity:0;
  }
  .box-stage.opened .ray{ animation: ray-shoot 0.8s ease-out forwards; }
  @keyframes ray-shoot{
    0%{ height:0; opacity:0.95; }
    100%{ height:170px; opacity:0; }
  }

  /* confetti */
  .confetti-piece{
    position:absolute; left:50%; top:38%;
    opacity:0; pointer-events:none;
  }
  .box-stage.opened .confetti-piece{ animation: shoot 1.3s ease-out forwards; }
  @keyframes shoot{
    0%{ opacity:1; transform: translate(-50%,-50%) rotate(0deg) translateY(0) scale(1); }
    100%{ opacity:0; transform: translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) rotate(var(--rot)) scale(0.7); }
  }

  .cta-btn{
    position:relative; overflow:hidden;
    appearance:none; border:none; cursor:pointer;
    padding:14px 34px; border-radius:999px;
    font-size:17px; font-weight:700; letter-spacing:0.5px; color:#fff;
    background: linear-gradient(135deg, #ff5b8a, #ff2f92);
    box-shadow: 0 6px 18px rgba(255,47,146,0.55), inset 0 1px 0 rgba(255,255,255,0.4);
    transition: transform .15s ease, box-shadow .15s ease, opacity .3s ease;
  }
  .cta-btn::after{
    content:''; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.55), transparent);
    transform: skewX(-20deg);
    animation: shine 2.6s ease-in-out infinite;
  }
  @keyframes shine{ 0%{ left:-60%; } 40%{ left:130%; } 100%{ left:130%; } }
  .cta-btn:hover{ transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255,47,146,0.7); }
  .cta-btn:active{ transform: translateY(0px) scale(0.97); }
  .cta-btn:disabled{ opacity:0; pointer-events:none; }

  .status-text{
    color: var(--gold-bright); font-size:15px; font-weight:600; letter-spacing:1px;
    opacity:0; height:0; transition: opacity .3s ease;
  }
  .status-text.show{ opacity:1; height:auto; }

  /* ---------- CARD REVEAL ---------- */
  .card-reveal{
    position:absolute; z-index:6;
    display:flex; flex-direction:column; align-items:center; gap:22px;
    opacity:0; transform: scale(0.75); pointer-events:none;
    transition: opacity .7s cubic-bezier(.2,.8,.2,1), transform .7s cubic-bezier(.2,.8,.2,1);
  }
  .card-reveal.show{ opacity:1; transform: scale(1); pointer-events:auto; }
  .card-img{
    max-width:min(88vw, 780px); width:100%; border-radius:14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,47,146,0.35);
    display:block;
  }
  .yay-btn{
    appearance:none; border:none; cursor:pointer; padding:10px 26px; border-radius:999px;
    font-size:15px; font-weight:700; color:#3a0a2a;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    box-shadow: 0 6px 16px rgba(255,184,77,0.5);
    transition: transform .15s ease;
  }
  .yay-btn:hover{ transform: translateY(-2px); }

  @media (prefers-reduced-motion: reduce){
    .sparkle, .box-visual, .orbit, .confetti-piece, .ray{ animation: none !important; }
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="blob red"></div>
  <div class="blob violet"></div>
  <div class="pink-corner"></div>

  <div class="lights">
    <svg viewBox="0 0 1000 120" preserveAspectRatio="none">
      <path d="M0,20 C150,90 300,-10 500,50 C700,110 850,10 1000,40" fill="none" stroke="#4a3d55" stroke-width="2"/>
      <g id="bulb-group"></g>
    </svg>
  </div>

  <div id="sparkles"></div>

  <!-- GIFT BOX SCENE -->
  <div class="gift-scene" id="giftScene">
    <div class="headline"><span class="party">🎉</span> Happy Birthday <span class="party">🎉</span></div>

    <div class="box-stage" id="boxStage">
      <div class="ground-shadow"></div>

      <div class="orbit">
        <i style="top:8px; left:102.5px;"></i>
        <i style="top:102.5px; left:197px;"></i>
        <i style="top:197px; left:102.5px;"></i>
        <i style="top:102.5px; left:8px;"></i>
      </div>

      <div class="box-visual">
        <svg class="gift-svg" viewBox="0 0 220 220">
          <defs>
            <linearGradient id="frontGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ff8fc0"/>
              <stop offset="55%" stop-color="#ff4c9c"/>
              <stop offset="100%" stop-color="#d81a72"/>
            </linearGradient>
            <linearGradient id="sideGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#c20e63"/>
              <stop offset="100%" stop-color="#83063f"/>
            </linearGradient>
            <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffb8d9"/>
              <stop offset="100%" stop-color="#ff6fae"/>
            </linearGradient>
            <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#ffe08a"/>
              <stop offset="50%" stop-color="#ffb84d"/>
              <stop offset="100%" stop-color="#d97a1e"/>
            </linearGradient>
            <linearGradient id="ribbonGradV" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffe08a"/>
              <stop offset="50%" stop-color="#ffb84d"/>
              <stop offset="100%" stop-color="#d97a1e"/>
            </linearGradient>
            <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffa9d0"/>
              <stop offset="100%" stop-color="#ff5fa8"/>
            </linearGradient>
            <radialGradient id="interiorGrad" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="#fffef2"/>
              <stop offset="60%" stop-color="#ffe08a"/>
              <stop offset="100%" stop-color="rgba(255,224,138,0)"/>
            </radialGradient>
          </defs>

          <!-- box group (front/side/rim), glows while charging -->
          <g class="glow-pulse">
            <!-- right side face for 3D depth -->
            <polygon points="150,95 178,84 178,178 150,190" fill="url(#sideGrad)"/>
            <!-- front face -->
            <rect x="42" y="95" width="108" height="95" rx="5" fill="url(#frontGrad)"/>
            <!-- top rim sliver (box opening lip) -->
            <polygon points="42,95 68,84 178,84 150,95" fill="url(#rimGrad)"/>

            <!-- vertical ribbon on front -->
            <rect x="82" y="95" width="26" height="95" fill="url(#ribbonGradV)"/>
            <!-- vertical ribbon on side (projected) -->
            <polygon points="150,95 178,84 178,102 150,113" fill="#e0951f"/>
            <!-- horizontal ribbon on front -->
            <rect x="42" y="132" width="108" height="22" fill="url(#ribbonGrad)"/>
            <!-- horizontal ribbon wrapping to side -->
            <polygon points="150,132 178,121 178,143 150,154" fill="#e0951f"/>
            <!-- ribbon on rim -->
            <polygon points="68,84 92,84 102,95 78,95" fill="#ffce6b"/>
          </g>

          <!-- interior glow revealed once lid flies off -->
          <rect class="interior-glow" x="55" y="86" width="110" height="20" fill="url(#interiorGrad)"/>

          <!-- charging cracks of light at seam -->
          <g class="crack">
            <rect x="60" y="90" width="90" height="3" fill="#fff6d6"/>
            <rect x="93" y="80" width="3" height="20" fill="#fff6d6"/>
          </g>

          <!-- LID (animates open) -->
          <g class="lid-group glow-pulse">
            <polygon points="30,84 60,68 190,68 160,84" fill="url(#sideGrad)" opacity="0.85"/>
            <rect x="30" y="66" width="130" height="24" rx="8" fill="url(#lidGrad)"/>
            <rect x="82" y="66" width="26" height="24" fill="url(#ribbonGradV)"/>
            <!-- bow -->
            <path d="M95,68 C70,40 40,44 46,64 C50,76 76,72 95,68 Z" fill="url(#ribbonGrad)"/>
            <path d="M95,68 C120,40 150,44 144,64 C140,76 114,72 95,68 Z" fill="url(#ribbonGrad)"/>
            <path d="M95,68 C82,54 66,54 66,64 C66,70 82,70 95,68 Z" fill="#ffce6b" opacity="0.7"/>
            <path d="M95,68 C108,54 124,54 124,64 C124,70 108,70 95,68 Z" fill="#ffce6b" opacity="0.7"/>
            <circle cx="95" cy="68" r="9" fill="url(#ribbonGrad)"/>
          </g>
        </svg>
      </div>

      <!-- burst effects -->
      <div class="flash-overlay"></div>
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="rays" id="raysHolder"></div>
      <div id="confettiHolder"></div>
    </div>

    <button class="cta-btn" id="clickBtn">🎁 Click Here</button>
    <div class="status-text" id="statusText">Opening<span class="dot">...</span></div>
  </div>

  <!-- CARD REVEAL -->

    <button class="yay-btn" id="yayBtn">🎊 Yay! 🎊</button>

<script>
  // ---- string lights bulbs ----
  const bulbGroup = document.getElementById('bulb-group');
  const bulbColors = ['#ffe9b0','#ff9ecb','#ffd479','#ffb3d1','#ffe9b0','#ff9ecb','#ffd479'];
  const bulbX = [40,190,340,490,640,790,940];
  bulbX.forEach((x,i)=>{
    const y = 30 + Math.sin(i*1.3)*25;
    const c = bulbColors[i % bulbColors.length];
    const wire = document.createElementNS('http://www.w3.org/2000/svg','line');
    wire.setAttribute('x1', x); wire.setAttribute('y1', y-8);
    wire.setAttribute('x2', x); wire.setAttribute('y2', y);
    wire.setAttribute('stroke', '#4a3d55'); wire.setAttribute('stroke-width','1.5');
    bulbGroup.appendChild(wire);
    const bulb = document.createElementNS('http://www.w3.org/2000/svg','circle');
    bulb.setAttribute('cx', x); bulb.setAttribute('cy', y+6); bulb.setAttribute('r', 7);
    bulb.setAttribute('fill', c); bulb.setAttribute('class','bulb-glow'); bulb.style.color = c;
    bulbGroup.appendChild(bulb);
  });

  // ---- falling sparkles ----
  const sparkleHolder = document.getElementById('sparkles');
  for(let i=0;i<28;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 2 + Math.random()*3;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.setProperty('--drift', (Math.random()*60-30)+'px');
    s.style.animationDuration = (6 + Math.random()*8)+'s';
    s.style.animationDelay = (Math.random()*8)+'s';
    sparkleHolder.appendChild(s);
  }

  // ---- light rays ----
  const raysHolder = document.getElementById('raysHolder');
  const rayCount = 10;
  for(let i=0;i<rayCount;i++){
    const r = document.createElement('div');
    r.className = 'ray';
    const angle = (360/rayCount)*i;
    r.style.transform = `rotate(${angle}deg)`;
    r.style.animationDelay = (Math.random()*0.1)+'s';
    raysHolder.appendChild(r);
  }

  // ---- confetti burst pieces (mixed shapes) ----
  const confettiHolder = document.getElementById('confettiHolder');
  const confettiColors = ['#ff2f92','#ffd479','#ffffff','#c084fc','#ff9ecb','#ffe08a'];
  for(let i=0;i<34;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const angle = Math.random()*Math.PI*2;
    const dist = 90 + Math.random()*150;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist - 50;
    p.style.setProperty('--dx', dx+'px');
    p.style.setProperty('--dy', dy+'px');
    p.style.setProperty('--rot', (Math.random()*720-360)+'deg');
    const shapeType = i % 3;
    const color = confettiColors[i % confettiColors.length];
    if(shapeType === 0){
      p.style.width = '7px'; p.style.height = '13px'; p.style.background = color; p.style.borderRadius='2px';
    } else if(shapeType === 1){
      p.style.width = '8px'; p.style.height = '8px'; p.style.background = color; p.style.borderRadius='50%';
    } else {
      p.style.width = '0'; p.style.height = '0';
      p.style.borderLeft = '5px solid transparent';
      p.style.borderRight = '5px solid transparent';
      p.style.borderBottom = `9px solid ${color}`;
    }
    p.style.animationDelay = (Math.random()*0.18)+'s';
    confettiHolder.appendChild(p);
  }

  // ---- interaction flow ----
  const clickBtn = document.getElementById('clickBtn');
  const boxStage = document.getElementById('boxStage');
  const statusText = document.getElementById('statusText');
  const giftScene = document.getElementById('giftScene');
  const cardReveal = document.getElementById('cardReveal');

  clickBtn.addEventListener('click', () => {
    clickBtn.disabled = true;
    boxStage.classList.add('charging');
    statusText.classList.add('show');

    setTimeout(() => {
      boxStage.classList.remove('charging');
      boxStage.classList.add('opened');
    }, 1300);

    setTimeout(() => {
      giftScene.classList.add('hide');
    }, 2500);

    setTimeout(() => {
      cardReveal.classList.add('show');
    }, 2800);
  });

  document.getElementById('yayBtn').addEventListener('click', () => {
    const btn = document.getElementById('yayBtn');
    btn.textContent = '🎉 Happy Birthday! 🎉';
  });
</script>
